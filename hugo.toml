baseURL = "https://thishw.github.io/korea-digest/"
title = "Korea Digest"
defaultContentLanguage = "ko"
enableRobotsTXT = true

# 홈에서 검색 색인(index.json) 생성 — 공통 Module의 클라이언트 검색이 사용
[outputs]
  home = ["HTML", "RSS", "JSON", "llms"]

# llms.txt — LLM용 사이트 인덱스 (GEO 실험)
[outputFormats.llms]
  mediaType = "text/plain"
  baseName  = "llms"
  isPlainText = true

[params]
  author         = "HW"
  site_key       = "korea_digest"
  tier           = "B"
  description    = "한국 이슈를 한눈에 — 큐레이션 다이제스트"
  og_site_name   = "Korea Digest"
  og_locale      = "ko_KR"
  og_image       = ""
  gtm_id         = ""
  verify_google  = ""
  verify_naver   = ""
  verify_bing    = ""
  adsense_pub_id = ""
  daum_verification = ""

[taxonomies]
  category = "categories"
  tag      = "tags"

[[menu.main]]
  name   = "홈"
  url    = "/"
  weight = 1

[[menu.main]]
  name   = "글"
  url    = "/posts/"
  weight = 2

[markup.goldmark.renderer]
  unsafe = true

[module]
  [[module.imports]]
    path = "github.com/thishw/synapse-hugo-shared"
